name: Build Android APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Install Dependencies
        run: npm install

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $HOME/my-release-key.keystore

      - name: Fix tauri.settings.gradle
        run: |
          TAURI_ANDROID=$(find $HOME/.cargo/registry/src -path "*/tauri-*/mobile/android" -type d 2>/dev/null | head -1)
          echo "Found tauri-android at: $TAURI_ANDROID"
          cat > src-tauri/gen/android/tauri.settings.gradle << GRADLE
          include ':tauri-android'
          project(':tauri-android').projectDir = new File("$TAURI_ANDROID")
          GRADLE
          cat src-tauri/gen/android/tauri.settings.gradle

      - name: Build APK
        run: npm run tauri android build
        env:
          ANDROID_KEYSTORE_PATH: /home/runner/my-release-key.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-gastos-release
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
